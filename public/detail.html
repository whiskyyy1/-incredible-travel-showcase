<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行详情</title>
  <style>
    :root {
      --bg: #faf9f7;
      --card-bg: #ffffff;
      --text: #2d2d2d;
      --text-light: #666666;
      --accent: #c9a87c;
      --accent-dark: #a88b5e;
      --border: #e8e4df;
      --shadow: 0 4px 20px rgba(0,0,0,0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    /* 导航栏 */
    nav {
      background: var(--card-bg);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    nav .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    nav .brand {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text);
      text-decoration: none;
    }
    nav .brand span { color: var(--accent); }
    nav .back {
      font-size: 0.875rem;
      color: var(--text-light);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      transition: color 0.2s;
    }
    nav .back:hover { color: var(--accent-dark); }

    /* 主内容区 */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
    }

    /* 顶部大图 */
    .hero-image {
      width: 100%;
      height: 420px;
      object-fit: cover;
      border-radius: 0 0 16px 16px;
      display: block;
      background: #eee;
    }
    @media (max-width: 576px) { .hero-image { height: 280px; border-radius: 0; } }

    /* 详情卡片 */
    .detail-card {
      background: var(--card-bg);
      border-radius: 16px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-top: -3rem;
      position: relative;
      z-index: 10;
      padding: 2.5rem;
    }
    @media (max-width: 576px) {
      .detail-card { margin-top: -1.5rem; padding: 1.5rem; border-radius: 12px; }
    }

    .detail-header { margin-bottom: 1.5rem; }
    .detail-header h1 {
      font-size: 1.875rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }
    @media (max-width: 576px) { .detail-header h1 { font-size: 1.5rem; } }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .meta-item {
      font-size: 0.9375rem;
      color: var(--text-light);
      display: flex;
      align-items: center;
      gap: 0.375rem;
    }
    .meta-item strong { color: var(--text); font-weight: 500; }

    .tags-row {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .tag {
      font-size: 0.8125rem;
      padding: 0.375rem 0.875rem;
      border-radius: 20px;
      background: #f3efe8;
      color: var(--accent-dark);
      font-weight: 500;
    }
    .tag.type { background: #e8f4f0; color: #4a907a; }

    .description {
      font-size: 1.0625rem;
      color: var(--text-light);
      line-height: 1.7;
      padding: 1rem 0;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .section { margin-bottom: 2rem; }
    .section:last-child { margin-bottom: 0; }
    .section h2 {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section p {
      font-size: 1rem;
      color: var(--text-light);
      line-height: 1.8;
    }

    /* 状态提示 */
    .state {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--text-light);
    }
    .state .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="brand">100种<span>不可思议</span>旅行</a>
      <a href="/" class="back">← 返回列表</a>
    </div>
  </nav>

  <div id="state" class="state">
    <div class="spinner"></div>
    <p>正在加载旅行详情...</p>
  </div>

  <div id="detailWrap" style="display:none;">
    <img id="heroImage" class="hero-image" src="" alt="">
    <div class="container">
      <div class="detail-card">
        <div class="detail-header">
          <h1 id="title"></h1>
          <div class="meta-row">
            <div class="meta-item">📍 <strong id="location"></strong></div>
            <div class="meta-item">⭐ 小众程度 <strong id="niche"></strong></div>
          </div>
          <div class="tags-row">
            <span id="typeTag" class="tag type"></span>
            <span id="styleTag" class="tag"></span>
          </div>
          <div class="description" id="description"></div>
        </div>
        <div class="section">
          <h2>📖 旅行故事</h2>
          <p id="story"></p>
        </div>
        <div class="section">
          <h2>💡 实用贴士</h2>
          <p id="tips"></p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const stateEl = document.getElementById('state');
    const detailWrap = document.getElementById('detailWrap');

    // 从 URL 获取 id 参数
    const urlParams = new URLSearchParams(window.location.search);
    const id = urlParams.get('id');

    async function loadDetail() {
      if (!id) {
        stateEl.innerHTML = '<p style="color:#c0392b;">缺少旅行 ID 参数</p>';
        return;
      }

      try {
        const res = await fetch(`/api/travels/${id}`);
        if (!res.ok) {
          if (res.status === 404) throw new Error('该旅行体验不存在');
          throw new Error('加载失败');
        }
        const result = await res.json();
        // 后端返回格式：{ data: { ... } }
        renderDetail(result.data);
      } catch (err) {
        stateEl.innerHTML = `<p style="color:#c0392b;">${err.message}</p>`;
      }
    }

    function renderDetail(t) {
      stateEl.style.display = 'none';
      detailWrap.style.display = 'block';
      document.title = `${t.title} | 100种不可思议旅行`;

      document.getElementById('heroImage').src = t.cover_image;
      document.getElementById('heroImage').alt = t.title;
      document.getElementById('title').textContent = t.title;
      document.getElementById('location').textContent = t.location;
      document.getElementById('niche').textContent = '★'.repeat(t.niche_level) + '☆'.repeat(5 - t.niche_level);
      document.getElementById('typeTag').textContent = t.experience_type;
      document.getElementById('styleTag').textContent = t.visual_style;
      document.getElementById('description').textContent = t.description;
      document.getElementById('story').textContent = t.story || '暂无故事内容';
      document.getElementById('tips').textContent = t.tips || '暂无贴士内容';
    }

    loadDetail();
  </script>
</body>
</html>
